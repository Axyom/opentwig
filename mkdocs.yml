site_name: openwig
site_description: Algorithmic composition for Bitwig Studio - write Python, get songs.
site_url: https://Axyom.github.io/openwig/
repo_url: https://github.com/Axyom/openwig
repo_name: Axyom/openwig
docs_dir: docs
site_dir: site
strict: false

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: pink
      toggle: { icon: material/weather-night, name: Switch to dark mode }
    - scheme: slate
      primary: indigo
      accent: pink
      toggle: { icon: material/weather-sunny, name: Switch to light mode }
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - Songs: songs.md
  - API reference: reference.md
